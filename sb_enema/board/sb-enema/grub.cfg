set default=0
set timeout=3

insmod normal

serial --unit=0 --speed=115200
terminal_output serial
terminal_input serial

menuentry 'SB-ENEMA reprovisioning' {
    insmod part_gpt
    insmod fat
    set root=(hd0,gpt1)
    linux /bzImage console=ttyS0,115200 rdinit=/init
    initrd /rootfs.cpio.gz
}
