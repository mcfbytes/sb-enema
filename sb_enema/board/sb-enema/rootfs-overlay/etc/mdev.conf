# mdev.conf — SB-ENEMA device event rules
#
# Format: <regex> <uid>:<gid> <octal> [<@=$> <command>]
#   @  = run command after device node is created  (add event)
#   $  = run command before device node is removed (remove event)
#   *  = run command on both add and remove events
#
# Automount the FAT data partition (UUID BEEF-CAFE) whenever a partition
# device node appears or disappears.  This covers both cold-plug (mdev -s
# scans /sys at init time) and hot-plug (e.g. USB reattach).
#
# Match block partition devices: sda1, sdb1, mmcblk0p1, etc.
sd[a-z][0-9]       root:disk  0660  */lib/mdev/mount-data.sh
sd[a-z][0-9][0-9]  root:disk  0660  */lib/mdev/mount-data.sh
mmcblk[0-9]+p[0-9]+  root:disk  0660  */lib/mdev/mount-data.sh
nvme[0-9]+n[0-9]+p[0-9]+  root:disk  0660  */lib/mdev/mount-data.sh
