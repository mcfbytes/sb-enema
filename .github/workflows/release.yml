name: release

on:
  push:
    tags:
      - "v*"

permissions:
  actions: read
  contents: write
  id-token: write
  attestations: write
  security-events: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Stamp version
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "VERSION=${version}" >> "$GITHUB_ENV"
          esc_version="${version//\//\\/}"
          esc_version="${esc_version//&/\\&}"
          sed -i "s|^VERSION=\"@@VERSION@@\"|VERSION=\"${esc_version}\"|" sb_enema/board/sb-enema/rootfs-overlay/usr/sbin/sb-enema

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bc bison flex libssl-dev libncurses5-dev libelf-dev \
            rsync cpio unzip zip wget xz-utils file python3-venv curl git \
            pkg-config libffi-dev mtools

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Extract Buildroot version
        run: echo "BUILDROOT_VERSION=$(grep '^BUILDROOT_VERSION' Makefile | cut -d= -f2 | xargs)" >> $GITHUB_ENV

      - name: Cache Buildroot tarball
        uses: actions/cache@v5
        with:
          path: output/buildroot-*.tar.gz
          key: br-tarball-${{ env.BUILDROOT_VERSION }}

      - name: Cache Buildroot DL dir
        uses: actions/cache@v5
        with:
          path: output/dl
          key: br-dl-${{ env.BUILDROOT_VERSION }}-${{ hashFiles('sb_enema/configs/sb_enema_defconfig') }}
          restore-keys: br-dl-${{ env.BUILDROOT_VERSION }}-

      - name: Cache Buildroot host toolchain
        uses: actions/cache@v5
        with:
          path: |
            output/br-out/host
            output/br-out/build/host-*/.stamp_*
          key: br-host-${{ runner.os }}-${{ env.BUILDROOT_VERSION }}-${{ hashFiles('sb_enema/configs/sb_enema_defconfig', 'sb_enema/patches/**') }}
          restore-keys: |
            br-host-${{ runner.os }}-${{ env.BUILDROOT_VERSION }}-
            br-host-${{ runner.os }}-

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 4G

      - name: Build images
        run: |
          make -j$(nproc) BR2_CCACHE=y BR2_CCACHE_DIR=$GITHUB_WORKSPACE/.ccache BR2_CCACHE_USE_BASEDIR=y

      - name: Run Trivy rootfs scan
        uses: aquasecurity/trivy-action@0.34.2
        with:
          scan-type: fs
          scan-ref: output/br-out/target
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-rootfs.sarif

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-rootfs.sarif
          category: trivy-rootfs

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp output/br-out/images/sb-enema.img dist/
          cp docs/release-README.md dist/README.md
          cp trivy-rootfs.sarif dist/
          (cd dist && sha256sum sb-enema.img > SHA256SUMS)

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.23.0
        with:
          path: output/br-out/target/
          format: spdx-json
          output-file: dist/sbom.spdx.json

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/sb-enema.img

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/sb-enema.img
            dist/README.md
            dist/SHA256SUMS
            dist/sbom.spdx.json
            dist/trivy-rootfs.sarif

      - name: SBOM upload 
        uses: advanced-security/spdx-dependency-submission-action@v0.2.0
        with:
          filePath: "dist/sbom.spdx.json"
