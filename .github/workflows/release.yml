name: release

on:
  push:
    tags:
      - "v*"

permissions:
  actions: read
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write
      id-token: write
      attestations: write
      security-events: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Stamp version
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "VERSION=${version}" >> "$GITHUB_ENV"
          esc_version="${version//\//\\/}"
          esc_version="${esc_version//&/\\&}"
          sed -i "s|^VERSION=\"@@VERSION@@\"|VERSION=\"${esc_version}\"|" sb_enema/board/sb-enema/rootfs-overlay/usr/sbin/sb-enema

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bc bison flex libssl-dev libncurses5-dev libelf-dev \
            rsync cpio unzip zip wget xz-utils file python3-venv curl git \
            pkg-config libffi-dev mtools

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Extract Buildroot version
        run: echo "BUILDROOT_VERSION=$(grep '^BUILDROOT_VERSION' Makefile | cut -d= -f2 | xargs)" >> $GITHUB_ENV

      - name: Cache Buildroot tarball
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: output/buildroot-*.tar.gz
          key: br-tarball-${{ env.BUILDROOT_VERSION }}

      - name: Cache Buildroot DL dir
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: output/dl
          key: br-dl-${{ env.BUILDROOT_VERSION }}-${{ hashFiles('sb_enema/configs/sb_enema_defconfig') }}
          restore-keys: br-dl-${{ env.BUILDROOT_VERSION }}-

      - name: Cache Buildroot host toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            output/br-out/host
            output/br-out/build/host-*/.stamp_*
          key: br-host-${{ runner.os }}-${{ env.BUILDROOT_VERSION }}-${{ hashFiles('sb_enema/configs/sb_enema_defconfig', 'sb_enema/patches/**') }}
          restore-keys: |
            br-host-${{ runner.os }}-${{ env.BUILDROOT_VERSION }}-
            br-host-${{ runner.os }}-

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          max-size: 4G

      - name: Build images
        run: |
          make -j$(nproc) BR2_CCACHE=y BR2_CCACHE_DIR=$GITHUB_WORKSPACE/.ccache BR2_CCACHE_USE_BASEDIR=y dist

      - name: Run Trivy rootfs scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: output/br-out/target
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-rootfs.sarif

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          sarif_file: trivy-rootfs.sarif
          category: trivy-rootfs

      - name: Create SBOM output dir
        run: mkdir -p ${{ github.workspace }}/sbom
      
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: output/br-out/target/
          format: spdx-json
          output-file: "${{ github.workspace }}/sbom/sbom.spdx.json"

      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/sb-enema.zip
            dist/SHA256SUMS
            sbom/sbom.spdx.json

      - name: Stage attestation bundle for release
        run: |
          cp "${{ steps.attest.outputs.bundle-path }}" \
             dist/sb-enema.intoto.jsonl

      - name: Upload release assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            dist/sb-enema.zip
            dist/sb-enema.intoto.jsonl
            dist/README.md
            dist/SHA256SUMS
            sbom/sbom.spdx.json
            trivy-rootfs.sarif

      - name: SBOM upload
        uses: advanced-security/spdx-dependency-submission-action@169d22427d74f3faf93504e70b03eede8dab272a # v0.2.0
        with:
          filePath: "${{ github.workspace }}/sbom/"
