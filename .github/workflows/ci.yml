name: build

on:
  # Only rebuild the image when files that actually affect the Buildroot
  # output change. Skipping the build for changes that don't impact the
  # image (workflow/CI metadata, documentation, and the sb-enema runtime
  # shell code installed via the rootfs overlay) keeps PR feedback fast,
  # since a full image build can take ~15 minutes on GitHub runners.
  # Fast security scans (codacy, scorecard, dependency-review, lint) run
  # in their own workflows and are intentionally not gated by these
  # filters, so security coverage is unchanged.
  pull_request:
    paths-ignore:
      - '.github/**'
      - 'docs/**'
      - 'sb_enema/board/sb-enema/rootfs-overlay/**'
      - '**.md'
      - 'LICENSE'
      - 'SecureBootChecker.ps1'
      - '.gitignore'
  push:
    branches:
      - master
    paths-ignore:
      - '.github/**'
      - 'docs/**'
      - 'sb_enema/board/sb-enema/rootfs-overlay/**'
      - '**.md'
      - 'LICENSE'
      - 'SecureBootChecker.ps1'
      - '.gitignore'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-image:
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bc bison flex libssl-dev libncurses5-dev libelf-dev \
            rsync cpio unzip wget xz-utils file python3-venv curl git \
            pkg-config libffi-dev mtools

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Extract Buildroot version
        run: echo "BUILDROOT_VERSION=$(grep '^BUILDROOT_VERSION' Makefile | cut -d= -f2 | xargs)" >> $GITHUB_ENV

      - name: Cache Buildroot tarball
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: output/buildroot-*.tar.gz
          key: br-tarball-${{ env.BUILDROOT_VERSION }}

      - name: Cache Buildroot DL dir
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: output/dl
          key: br-dl-${{ env.BUILDROOT_VERSION }}-${{ hashFiles('sb_enema/configs/sb_enema_defconfig') }}
          restore-keys: br-dl-${{ env.BUILDROOT_VERSION }}-

      - name: Cache Buildroot host toolchain
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            output/br-out/host
            output/br-out/build/host-*/.stamp_*
          key: br-host-${{ runner.os }}-${{ env.BUILDROOT_VERSION }}-${{ hashFiles('sb_enema/configs/sb_enema_defconfig', 'sb_enema/patches/**') }}
          restore-keys: |
            br-host-${{ runner.os }}-${{ env.BUILDROOT_VERSION }}-
            br-host-${{ runner.os }}-

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          max-size: 4G

      - name: Build images
        run: |
          make -j$(nproc) BR2_CCACHE=y BR2_CCACHE_DIR=$GITHUB_WORKSPACE/.ccache BR2_CCACHE_USE_BASEDIR=y

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sb-enema-image
          path: output/br-out/images/sb-enema.img
          if-no-files-found: error
          retention-days: 7
