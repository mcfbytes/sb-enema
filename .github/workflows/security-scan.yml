name: security-scan

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  scan:
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write
      security-events: write
      id-token: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bc bison flex libssl-dev libncurses5-dev libelf-dev \
            rsync cpio unzip wget xz-utils file python3-venv curl git \
            pkg-config libffi-dev mtools

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Extract Buildroot version
        run: echo "BUILDROOT_VERSION=$(grep '^BUILDROOT_VERSION' Makefile | cut -d= -f2 | xargs)" >> $GITHUB_ENV

      - name: Cache Buildroot tarball
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: output/buildroot-*.tar.gz
          key: br-tarball-${{ env.BUILDROOT_VERSION }}

      - name: Cache Buildroot DL dir
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: output/dl
          key: br-dl-${{ env.BUILDROOT_VERSION }}-${{ hashFiles('sb_enema/configs/sb_enema_defconfig') }}
          restore-keys: br-dl-${{ env.BUILDROOT_VERSION }}-

      - name: Cache Buildroot host toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            output/br-out/host
            output/br-out/build/host-*/.stamp_*
          key: br-host-${{ runner.os }}-${{ env.BUILDROOT_VERSION }}-${{ hashFiles('sb_enema/configs/sb_enema_defconfig', 'sb_enema/patches/**') }}
          restore-keys: |
            br-host-${{ runner.os }}-${{ env.BUILDROOT_VERSION }}-
            br-host-${{ runner.os }}-

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          max-size: 4G

      - name: Build images
        run: |
          make -j$(nproc) BR2_CCACHE=y BR2_CCACHE_DIR=$GITHUB_WORKSPACE/.ccache BR2_CCACHE_USE_BASEDIR=y

      - name: Run Trivy rootfs scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: output/br-out/target
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-rootfs.sarif

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          sarif_file: trivy-rootfs.sarif
          category: trivy-rootfs

      - name: Create SBOM output dir
        run: mkdir -p ${{ github.workspace }}/sbom
      
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: output/br-out/target/
          format: spdx-json
          output-file: "${{ github.workspace }}/sbom/sbom.spdx.json"

      - name: SBOM upload
        uses: advanced-security/spdx-dependency-submission-action@169d22427d74f3faf93504e70b03eede8dab272a # v0.2.0
        with:
          filePath: "${{ github.workspace }}/sbom/"
